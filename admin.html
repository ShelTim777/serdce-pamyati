<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ-панель - Сердце Памяти</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>
<style>
:root {
    --bg: #0a0a0a;
    --text: #e8e8e8;
    --accent: #d4af37;
    --gray: #888;
    --dark-gray: #151515;
    --success: #4caf50;
    --danger: #f44336;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: linear-gradient(180deg, rgba(212, 175, 55, 0.05) 0%, var(--bg) 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
}
.login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}
.login-box {
    background: rgba(21, 21, 21, 0.95);
    border: 2px solid var(--accent);
    border-radius: 16px;
    padding: 50px 40px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
}
.login-box h1 {
    font-family: 'Playfair Display', serif;
    color: var(--accent);
    margin-bottom: 10px;
    font-size: 28px;
}
.login-box p {
    color: var(--gray);
    margin-bottom: 30px;
    font-size: 14px;
}
.login-input {
    width: 100%;
    padding: 14px;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 20px;
}
.login-input:focus {
    outline: none;
    border-color: var(--accent);
}
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
    color: #000;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
}
.login-error {
    color: var(--danger);
    margin-top: 15px;
    font-size: 14px;
    display: none;
}
.admin-panel {
    display: none;
    padding: 40px 20px;
    max-width: 1200px;
    margin: 0 auto;
}
.admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}
.admin-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--accent);
}
.btn-logout {
    background: transparent;
    border: 2px solid var(--danger);
    color: var(--danger);
    padding: 10px 25px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-logout:hover {
    background: var(--danger);
    color: #fff;
}
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}
.stat-card {
    background: rgba(21, 21, 21, 0.8);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 12px;
    padding: 25px;
    text-align: center;
}
.stat-number {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
}
.stat-label {
    color: var(--gray);
    font-size: 14px;
    margin-top: 5px;
}
.add-form {
    background: rgba(21, 21, 21, 0.8);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 12px;
    padding: 40px;
    margin-bottom: 40px;
}
.form-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--accent);
    margin-bottom: 30px;
}
.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
}
.form-group {
    display: flex;
    flex-direction: column;
}
.form-group label {
    color: var(--gray);
    font-size: 14px;
    margin-bottom: 8px;
}
.form-group input,
.form-group select {
    padding: 12px;
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
}
.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--accent);
}
.btn-add {
    background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
    color: #000;
    padding: 14px 40px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
    margin-right: 10px;
}
.btn-add:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
}
.btn-generate {
    background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
    color: #fff;
}
.people-list { margin-bottom: 40px; }
.list-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--accent);
    margin-bottom: 20px;
}
.person-card {
    background: rgba(21, 21, 21, 0.8);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    transition: all 0.3s;
}
.person-card:hover {
    border-color: var(--accent);
    transform: translateX(5px);
}
.person-info { flex: 1; min-width: 200px; }
.person-name { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
.person-details { font-size: 14px; color: var(--gray); }
.person-category {
    display: inline-block;
    background: rgba(212, 175, 55, 0.2);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 5px;
}
.person-actions { display: flex; gap: 10px; }
.btn-edit, .btn-delete, .btn-download {
    padding: 8px 20px;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-edit { background: rgba(212, 175, 55, 0.2); color: var(--accent); }
.btn-edit:hover { background: var(--accent); color: #000; }
.btn-delete { background: rgba(244, 67, 54, 0.2); color: var(--danger); }
.btn-delete:hover { background: var(--danger); color: #fff; }
.btn-download { background: rgba(76, 175, 80, 0.2); color: var(--success); }
.btn-download:hover { background: var(--success); color: #fff; }
.export-section {
    background: rgba(21, 21, 21, 0.8);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 12px;
    padding: 30px;
    margin-bottom: 40px;
}
.export-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 15px;
}
.export-desc { color: var(--gray); font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
.btn-export {
    background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
    color: #fff;
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-right: 10px;
    margin-bottom: 10px;
}
.btn-export:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
}
.instructions {
    background: rgba(212, 175, 55, 0.1);
    border-left: 4px solid var(--accent);
    padding: 20px;
    margin-top: 20px;
    border-radius: 4px;
}
.instructions h3 { color: var(--accent); margin-bottom: 15px; }
.instructions ol { margin-left: 20px; color: var(--text); line-height: 1.8; }
.instructions li { margin-bottom: 10px; }
.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--success);
    color: #fff;
    padding: 15px 25px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 3000;
    display: none;
}
@media (max-width: 768px) {
    .admin-header { flex-direction: column; gap: 15px; }
    .form-grid { grid-template-columns: 1fr; }
    .person-card { flex-direction: column; align-items: flex-start; }
    .person-actions { width: 100%; }
    .btn-edit, .btn-delete, .btn-download { flex: 1; }
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>Админ-панель</h1>
        <p>Введите пароль для доступа</p>
        <input type="password" class="login-input" id="passwordInput" placeholder="Пароль">
        <button class="btn-login" onclick="checkPassword()">Войти</button>
        <p class="login-error" id="loginError">Неверный пароль</p>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="admin-header">
        <h1 class="admin-title">Управление мемориалами</h1>
        <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Всего мемориалов</div></div>
        <div class="stat-card"><div class="stat-number" id="statSVO">0</div><div class="stat-label">Герои СВО</div></div>
        <div class="stat-card"><div class="stat-number" id="statVeterans">0</div><div class="stat-label">Ветераны</div></div>
        <div class="stat-card"><div class="stat-number" id="statCities">0</div><div class="stat-label">Городов</div></div>
    </div>

    <div class="add-form">
        <h2 class="form-title" id="formTitle">Создать новый мемориал</h2>
        <div class="form-grid">
            <div class="form-group"><label>ФИО полностью *</label><input type="text" id="personName" placeholder="Иванов Иван Иванович"></div>
            <div class="form-group"><label>Дата *</label><input type="text" id="personDate" placeholder="01.01.1990"></div>
            <div class="form-group"><label>Категория *</label>
                <select id="personCategory">
                    <option value="svo">Герои СВО</option>
                    <option value="veteran">Ветераны</option>
                    <option value="significant">Значимые люди</option>
                    <option value="personal">Личная память</option>
                </select>
            </div>
            <div class="form-group"><label>Город *</label><input type="text" id="personCity" placeholder="Москва"></div>
            <div class="form-group"><label>Широта *</label><input type="number" step="0.0001" id="personLat" placeholder="55.7558"></div>
            <div class="form-group"><label>Долгота *</label><input type="number" step="0.0001" id="personLng" placeholder="37.6173"></div>
            <div class="form-group"><label>Цитата</label><input type="text" id="personQuote" placeholder="«Мы не просто защищали землю...»"></div>
            <div class="form-group"><label>Награды</label><input type="text" id="personAwards" placeholder="Награждён медалью «За отвагу»"></div>
        </div>
        <button class="btn-add" onclick="addPerson()">💾 Добавить в базу</button>
        <button class="btn-add btn-generate" onclick="generateMemorial()" id="btnGenerate" style="display: none;"> Создать ZIP-архив</button>
        <button class="btn-add" onclick="cancelEdit()" id="btnCancel" style="display: none; background: linear-gradient(135deg, #757575 0%, #616161 100%);">Отмена</button>
        
        <div class="instructions" id="instructions" style="display: none;">
            <h3>📋 Инструкция:</h3>
            <ol>
                <li>Распакуй ZIP-архив</li>
                <li>Загрузи папку на GitHub в <code>memorial/</code></li>
                <li>Загрузи фото в <code>img/</code>, видео в <code>videos/</code></li>
                <li>Скопируй код для карты и обнови <code>index.html</code></li>
            </ol>
        </div>
    </div>

    <div class="people-list">
        <h2 class="list-title">Существующие мемориалы</h2>
        <div id="peopleContainer"></div>
    </div>

    <div class="export-section">
        <h2 class="export-title">Экспорт данных</h2>
        <p class="export-desc">Скопируй код и вставь в <code>index.html</code> вместо старого массива <code>memorials</code></p>
        <button class="btn-export" onclick="exportCode()"> Скопировать код для карты</button>
        <button class="btn-export" onclick="exportJSON()" style="background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);">💾 Скачать JSON</button>
    </div>
</div>

<div class="notification" id="notification"></div>

<script>
const ADMIN_PASSWORD = 'serdce2026';
let memorials = JSON.parse(localStorage.getItem('memorials_db') || '[{"id":"grigorev_dmitriy","name":"Григорьев Дмитрий Николаевич","dates":"23.08.1993","category":"svo","city":"Москва","coords":[55.7558,37.6173],"quote":"Мы не просто защищали землю","awards":"Ветеран СВО","link":"memorial/grigorev_dmitriy/","candles":0}]');
let editIndex = -1;
let currentPerson = null;

function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    if (input === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        localStorage.setItem('admin_logged_in', 'true');
        renderPeople();
        updateStats();
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

function logout() {
    localStorage.removeItem('admin_logged_in');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('passwordInput').value = '';
}

if (localStorage.getItem('admin_logged_in') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderPeople();
    updateStats();
}

function addPerson() {
    const name = document.getElementById('personName').value.trim();
    const date = document.getElementById('personDate').value.trim();
    const category = document.getElementById('personCategory').value;
    const city = document.getElementById('personCity').value.trim();
    const lat = parseFloat(document.getElementById('personLat').value);
    const lng = parseFloat(document.getElementById('personLng').value);
    const quote = document.getElementById('personQuote').value.trim();
    const awards = document.getElementById('personAwards').value.trim();

    if (!name || !date || !city || isNaN(lat) || isNaN(lng)) {
        showNotification('Заполните все обязательные поля!', 'error');
        return;
    }

    const id = name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_а-яё]/g, '');
    
    currentPerson = {
        id: id,
        name: name,
        dates: date,
        category: category,
        city: city,
        coords: [lat, lng],
        quote: quote || '«Мы не просто защищали землю»',
        awards: awards || 'Ветеран СВО',
        link: 'memorial/' + id + '/',
        candles: 0
    };

    if (editIndex >= 0) {
        memorials[editIndex] = currentPerson;
        editIndex = -1;
        document.getElementById('formTitle').textContent = 'Создать новый мемориал';
        document.getElementById('btnGenerate').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
        document.getElementById('instructions').style.display = 'none';
        showNotification('Мемориал обновлен!');
    } else {
        memorials.push(currentPerson);
        document.getElementById('btnGenerate').style.display = 'inline-block';
        document.getElementById('instructions').style.display = 'block';
        showNotification('Мемориал добавлен! Теперь создай ZIP.');
    }

    saveData();
    renderPeople();
    updateStats();
}

function generateMemorial() {
    if (!currentPerson) {
        showNotification('Сначала добавьте человека!', 'error');
        return;
    }

    const zip = new JSZip();
    const folder = zip.folder(currentPerson.id);
    
    const htmlContent = generateMemorialHTML(currentPerson);
    folder.file('index.html', htmlContent);
    
    folder.folder('img');
    folder.folder('videos');
    folder.folder('audio');
    
    const readme = '# Мемориал: ' + currentPerson.name + '\n\nЗагрузи фото в img/, видео в videos/';
    folder.file('README.md', readme);
    
    zip.generateAsync({type: 'blob'}).then(function(content) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = currentPerson.id + '.zip';
        a.click();
        showNotification('ZIP создан!');
    });
}

function cancelEdit() {
    editIndex = -1;
    currentPerson = null;
    document.getElementById('formTitle').textContent = 'Создать новый мемориал';
    document.getElementById('btnGenerate').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('instructions').style.display = 'none';
    clearForm();
    showNotification('Редактирование отменено');
}

function deletePerson(index) {
    if (confirm('Удалить этот мемориал?')) {
        memorials.splice(index, 1);
        saveData();
        renderPeople();
        updateStats();
        showNotification('Мемориал удалён');
    }
}

function editPerson(index) {
    const person = memorials[index];
    document.getElementById('personName').value = person.name;
    document.getElementById('personDate').value = person.dates;
    document.getElementById('personCategory').value = person.category;
    document.getElementById('personCity').value = person.city;
    document.getElementById('personLat').value = person.coords[0];
    document.getElementById('personLng').value = person.coords[1];
    document.getElementById('personQuote').value = person.quote || '';
    document.getElementById('personAwards').value = person.awards || '';
    
    editIndex = index;
    currentPerson = person;
    document.getElementById('formTitle').textContent = 'Редактировать: ' + person.name;
    document.getElementById('btnGenerate').style.display = 'inline-block';
    document.getElementById('btnCancel').style.display = 'inline-block';
    document.getElementById('instructions').style.display = 'block';
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showNotification('Измените данные и нажмите "Добавить"');
}

function renderPeople() {
    const container = document.getElementById('peopleContainer');
    if (memorials.length === 0) {
        container.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 40px;">Нет мемориалов</p>';
        return;
    }
    const categoryNames = { 'svo': 'Герои СВО', 'veteran': 'Ветераны', 'significant': 'Значимые люди', 'personal': 'Личная память' };
    container.innerHTML = memorials.map((person, index) => 
        '<div class="person-card">' +
        '<div class="person-info">' +
        '<div class="person-name">' + person.name + '</div>' +
        '<div class="person-details">' + person.dates + ' • ' + person.city + ' • Свечей: ' + person.candles + '</div>' +
        '<span class="person-category">' + categoryNames[person.category] + '</span>' +
        '</div>' +
        '<div class="person-actions">' +
        '<button class="btn-edit" onclick="editPerson(' + index + ')">Редактировать</button>' +
        '<button class="btn-download" onclick="downloadMemorial(' + index + ')">Скачать ZIP</button>' +
        '<button class="btn-delete" onclick="deletePerson(' + index + ')">Удалить</button>' +
        '</div></div>'
    ).join('');
}

function downloadMemorial(index) {
    currentPerson = memorials[index];
    generateMemorial();
}

function updateStats() {
    document.getElementById('statTotal').textContent = memorials.length;
    document.getElementById('statSVO').textContent = memorials.filter(m => m.category === 'svo').length;
    document.getElementById('statVeterans').textContent = memorials.filter(m => m.category === 'veteran').length;
    const cities = new Set(memorials.map(m => m.city));
    document.getElementById('statCities').textContent = cities.size;
}

function saveData() {
    localStorage.setItem('memorials_db', JSON.stringify(memorials));
}

function clearForm() {
    document.getElementById('personName').value = '';
    document.getElementById('personDate').value = '';
    document.getElementById('personCity').value = '';
    document.getElementById('personLat').value = '';
    document.getElementById('personLng').value = '';
    document.getElementById('personQuote').value = '';
    document.getElementById('personAwards').value = '';
}

function exportCode() {
    const code = 'const memorials = ' + JSON.stringify(memorials, null, 2) + ';';
    navigator.clipboard.writeText(code).then(() => {
        showNotification('Код скопирован!');
    }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = code;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showNotification('Код скопирован!');
    });
}

function exportJSON() {
    const dataStr = JSON.stringify(memorials, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'memorials.json';
    a.click();
    URL.revokeObjectURL(url);
    showNotification('JSON скачан!');
}

function showNotification(message, type) {
    const notif = document.getElementById('notification');
    notif.textContent = message;
    notif.style.background = type === 'error' ? 'var(--danger)' : 'var(--success)';
    notif.style.display = 'block';
    setTimeout(() => { notif.style.display = 'none'; }, 3000);
}

document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
});
<\/script>
