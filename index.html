<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сердце Памяти - Общероссийская сеть сохранения памяти</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e8e8e8;
            --accent: #d4af37;
            --gray: #888;
            --dark-gray: #151515;
            --red: #c41e3a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.05) 0%, var(--bg) 100%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* ШАПКА */
        header {
            background: rgba(10, 10, 10, 0.95);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            animation: fadeInUp 0.8s ease-out;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 32px;
            animation: pulse 2s infinite;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .btn-order, .btn-calc {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #000;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-order:hover, .btn-calc:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
        }

        /* ГЕРОЙ-БЛОК */
        .hero {
            text-align: center;
            padding: 120px 20px 80px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            margin-bottom: 20px;
            color: var(--text);
        }

        .hero p {
            font-size: 20px;
            color: var(--gray);
            margin-bottom: 40px;
            max-width: 700px;
            line-height: 1.6;
        }

        .btn-map {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-map:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        /* УСЛУГИ */
        .services {
            padding: 100px 20px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .services-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            text-align: center;
            color: var(--accent);
            margin-bottom: 60px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .service-card {
            background: rgba(21, 21, 21, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s;
        }

        .service-card:hover::before {
            transform: scaleX(1);
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
            border-color: var(--accent);
        }

        .service-badge {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .service-price {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin: 20px 0;
            font-family: 'Playfair Display', serif;
        }

        .service-list {
            text-align: left;
            margin: 25px 0;
        }

        .service-list li {
            padding: 8px 0;
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .service-list li::before {
            content: "✓";
            color: var(--accent);
            font-weight: bold;
        }

        .btn-service {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .btn-service:hover {
            background: var(--accent);
            color: #000;
        }

        /* КАЛЬКУЛЯТОР */
        .calc-section {
            padding: 80px 20px;
            background: rgba(21, 21, 21, 0.5);
            margin: 60px 0;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .calc-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            text-align: center;
            color: var(--accent);
            margin-bottom: 40px;
        }

        .calc-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(10, 10, 10, 0.9);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .calc-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calc-label {
            font-size: 16px;
            color: var(--text);
        }

        .calc-checkbox {
            width: 24px;
            height: 24px;
            accent-color: var(--accent);
        }

        .calc-total {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            text-align: right;
            margin-top: 20px;
            font-family: 'Playfair Display', serif;
        }

        /* ПРИНЦИПЫ */
        .principles {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .principles-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            text-align: center;
            color: var(--accent);
            margin-bottom: 60px;
        }

        .principles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .principle-card {
            background: rgba(21, 21, 21, 0.8);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .principle-icon {
            font-size: 40px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .principle-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text);
        }

        .principle-desc {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
        }

        /* КАРТА */
        .map-section {
            padding: 60px 40px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeInUp 1s ease-out 1s both;
        }

        .map-container {
            position: relative;
            height: 650px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        #map { width: 100%; height: 100%; }

        .map-stats {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(10, 10, 10, 0.9);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 100;
            backdrop-filter: blur(15px);
            min-width: 220px;
        }

        .stat-item {
            margin-bottom: 25px;
        }
        .stat-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .stat-value { font-size: 36px; font-weight: 700; color: var(--accent); font-family: 'Playfair Display', serif; }

        /* КАК ЭТО РАБОТАЕТ */
        .how-it-works {
            padding: 100px 40px;
            text-align: center;
            background: rgba(21, 21, 21, 0.5);
            animation: fadeInUp 1s ease-out 1.2s both;
        }
        .how-it-works h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 70px;
            color: var(--accent);
        }
        .steps {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .step {
            text-align: center;
            transition: transform 0.3s;
        }
        .step:hover { transform: translateY(-10px); }
        .step-icon { font-size: 72px; margin-bottom: 25px; }
        .step-title { font-size: 22px; font-weight: 600; margin-bottom: 15px; color: var(--text); }
        .step-desc { font-size: 15px; color: var(--gray); line-height: 1.6; }

        /* ПОДВАЛ */
        footer {
            background: #050505;
            padding: 60px 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        .footer-links a {
            color: var(--gray);
            text-decoration: none;
            transition: all 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer-links a:hover { color: var(--accent); }
        .footer-copy {
            font-size: 12px;
            color: #444;
        }

        /* МОДАЛЬНОЕ ОКНО КАЛЬК
